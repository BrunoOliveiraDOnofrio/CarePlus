spring.application.name=careplus

# Datasource - H2 (banco em memoria para desenvolvimento)
#spring.datasource.url=jdbc:h2:mem:careplusdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# H2 Console (acessar em: http://localhost:8080/h2-console)
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA / Hibernate
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SMTP Gmail (configure com credenciais reais para enviar emails)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=${MAIL_USERNAME:exemplo.email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:Senha-de-app-aqui}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# JWT
jwt.validity=3600000
jwt.secret=${JWT_SECRET:chave-secreta-jwt-para-desenvolvimento-minimo-64-caracteres-hs512-care-plus-2026}

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Sao_Paulo

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Para usar MySQL em producao, descomente e configure:
spring.datasource.url=jdbc:mysql://localhost:3306/careplus_novo
spring.datasource.username=careplus_user
spring.datasource.password=SenhaForte123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Tempo máximo que o producer fica bloqueado tentando conectar ao broker (padrăo: 60000ms)
# Reduzido para năo travar a requisiçăo quando o Kafka estiver desligado
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.request.timeout.ms=3000
spring.kafka.producer.properties.delivery.timeout.ms=5000
# Intervalo entre tentativas de reconexăo ao broker (reduz spam de logs)
spring.kafka.producer.properties.reconnect.backoff.ms=1000
spring.kafka.producer.properties.reconnect.backoff.max.ms=10000
# Năo falha na inicializaçăo da aplicaçăo se o Kafka estiver indisponível
spring.kafka.admin.fail-fast=false

# Silencia logs internos do Kafka quando o broker estiver desligado
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
logging.level.org.apache.kafka.clients.producer.internals.Sender=ERROR
logging.level.org.apache.kafka=ERROR

app.kafka.topic.consultas-criadas=consultas-criadas
app.kafka.group-id=mensageria-group

