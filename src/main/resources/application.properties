spring.application.name=careplus

# Variáveis de ambiente - PROD

# Datasource - H2 (banco em memoria para desenvolvimento)
#spring.datasource.url=jdbc:h2:mem:careplusdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# H2 Console (acessar em: http://localhost:8080/h2-console)
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA / Hibernate
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SMTP Gmail (configure com credenciais reais para enviar emails)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=${MAIL_USERNAME:exemplo.email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:Senha-de-app-aqui}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# JWT
jwt.validity=3600000
jwt.secret=${JWT_SECRET:chave-secreta-jwt-para-desenvolvimento-minimo-64-caracteres-hs512-care-plus-2026}

# Jackson date format - São Paulo, Brasil
spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Para usar MySQL em producao, descomente e configure:
spring.datasource.url=jdbc:mysql://localhost:3306/careplus_novo
spring.datasource.username=careplus_user
spring.datasource.password=SenhaForte123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ routing for consultas criadas
app.rabbitmq.exchange.consultas-criadas=consultas.criadas.exchange
app.rabbitmq.queue.consultas-criadas=consultas.criadas.queue
app.rabbitmq.routing-key.consultas-criadas=consultas.criadas

# RabbitMQ connection resilience - ensure connection is established and maintained
spring.rabbitmq.connection-timeout=30000
spring.rabbitmq.requested-heartbeat=60
spring.rabbitmq.channel-close-timeout=30000
spring.rabbitmq.network-recovery-interval=5000
spring.rabbitmq.automatic-recovery-enabled=true

# S3 Configuration
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:bucket-prontuarios-careplus}

# Character encoding - UTF-8 for all responses and HTTP
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true